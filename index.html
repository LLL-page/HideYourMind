<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚行真意 — 意图推理游戏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            void:    '#0a0a0f',
            abyss:   '#12121c',
            panel:   '#1a1a2e',
            accent:  '#e94560',
            glow:    '#0f3460',
            mute:    '#6b7280',
            gold:    '#f59e0b',
            teal:    '#14b8a6',
          },
          fontFamily: {
            mono: ['Consolas', 'Courier New', 'monospace'],
            sans: ['Inter', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-void text-gray-100 font-sans min-h-screen">
  <div id="app"></div>
  <script src="js/app.js"></script>
</body>
</html>
